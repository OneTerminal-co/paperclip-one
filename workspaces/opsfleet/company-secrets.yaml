# OpsFleet - Secrets Centralizados a Nivel de Compañía
# Estos secrets se configuran UNA VEZ y todos los agentes los heredan

company:
  id: "opsfleet-company"
  name: "OpsFleet Company"

# Secrets compartidos (configurar en Paperclip Secrets Manager)
secrets:
  # AWS Credentials (compartidas por FinOps, Security, Infra Ops)
  aws:
    access_key_id:
      type: "env"
      source: "AWS_ACCESS_KEY_ID"
      description: "AWS access key para org-wide access"

    secret_access_key:
      type: "env"
      source: "AWS_SECRET_ACCESS_KEY"
      description: "AWS secret key"

    region:
      type: "static"
      value: "us-east-1"
      description: "Primary AWS region"

    organizations_role_arn:
      type: "static"
      value: "arn:aws:iam::ACCOUNT_ID:role/OrgReadOnlyRole"
      description: "Role para acceso cross-account en organization"

  # Azure Credentials (compartidas por FinOps, Security, Compliance)
  azure:
    subscription_id:
      type: "env"
      source: "AZURE_SUBSCRIPTION_ID"

    tenant_id:
      type: "env"
      source: "AZURE_TENANT_ID"

    client_id:
      type: "env"
      source: "AZURE_CLIENT_ID"

    client_secret:
      type: "env"
      source: "AZURE_CLIENT_SECRET"

  # GitHub (compartido por CI/CD Agent)
  github:
    token:
      type: "env"
      source: "GITHUB_TOKEN"
      description: "GitHub PAT con scope repo, workflow"

    organization:
      type: "static"
      value: "oneterminal"

  # Paperclip (todos los agentes)
  paperclip:
    api_url:
      type: "static"
      value: "http://localhost:3100"

    api_key:
      type: "runtime"
      description: "Inyectado automáticamente por Paperclip en runtime"

# MCP Servers configurados a nivel de compañía
# Cada agente puede habilitar/deshabilitar según necesite
mcpServers:
  # Para FinOps Agent
  aws-cost-explorer:
    package: "@opsfleet/mcp-aws-cost"
    env:
      AWS_ACCESS_KEY_ID: "{{secrets.aws.access_key_id}}"
      AWS_SECRET_ACCESS_KEY: "{{secrets.aws.secret_access_key}}"
      AWS_REGION: "{{secrets.aws.region}}"
    capabilities:
      - "cost_explorer_query"
      - "compute_optimizer_recommendations"
      - "reserved_instances_list"
      - "savings_plans_list"

  # Para Security Agent
  aws-security:
    package: "@opsfleet/mcp-aws-security"
    env:
      AWS_ACCESS_KEY_ID: "{{secrets.aws.access_key_id}}"
      AWS_SECRET_ACCESS_KEY: "{{secrets.aws.secret_access_key}}"
      AWS_REGION: "{{secrets.aws.region}}"
    capabilities:
      - "security_hub_findings"
      - "guardduty_findings"
      - "iam_audit"
      - "security_groups_audit"
      - "s3_public_access_check"

  # Para Infra Ops Agent
  aws-cloudwatch:
    package: "@opsfleet/mcp-aws-cloudwatch"
    env:
      AWS_ACCESS_KEY_ID: "{{secrets.aws.access_key_id}}"
      AWS_SECRET_ACCESS_KEY: "{{secrets.aws.secret_access_key}}"
      AWS_REGION: "{{secrets.aws.region}}"
    capabilities:
      - "get_metric_statistics"
      - "list_alarms"
      - "describe_alarm_history"
      - "logs_insights_query"

  # Para FinOps + Security en Azure
  azure-cost-management:
    package: "@opsfleet/mcp-azure-cost"
    env:
      AZURE_SUBSCRIPTION_ID: "{{secrets.azure.subscription_id}}"
      AZURE_TENANT_ID: "{{secrets.azure.tenant_id}}"
      AZURE_CLIENT_ID: "{{secrets.azure.client_id}}"
      AZURE_CLIENT_SECRET: "{{secrets.azure.client_secret}}"
    capabilities:
      - "cost_query"
      - "advisor_recommendations"
      - "reserved_instances"

  # Para Security + Compliance en Azure
  azure-defender:
    package: "@opsfleet/mcp-azure-security"
    env:
      AZURE_SUBSCRIPTION_ID: "{{secrets.azure.subscription_id}}"
      AZURE_TENANT_ID: "{{secrets.azure.tenant_id}}"
      AZURE_CLIENT_ID: "{{secrets.azure.client_id}}"
      AZURE_CLIENT_SECRET: "{{secrets.azure.client_secret}}"
    capabilities:
      - "defender_for_cloud_score"
      - "security_alerts"
      - "compliance_results"

  # Para CI/CD Agent
  github-actions:
    package: "@modelcontextprotocol/server-github"
    env:
      GITHUB_TOKEN: "{{secrets.github.token}}"
    capabilities:
      - "list_workflows"
      - "get_workflow_runs"
      - "search_code"
      - "create_issue"

  # Para Knowledge Agent
  aws-knowledge-base:
    package: "@opsfleet/mcp-aws-knowledge"
    env:
      AWS_ACCESS_KEY_ID: "{{secrets.aws.access_key_id}}"
      AWS_SECRET_ACCESS_KEY: "{{secrets.aws.secret_access_key}}"
      AWS_REGION: "{{secrets.aws.region}}"
    capabilities:
      - "search_aws_docs"
      - "get_best_practices"
      - "get_service_quotas"

  # Para todos los agentes
  paperclip:
    package: "@paperclipai/mcp-server"
    env:
      PAPERCLIP_API_URL: "{{secrets.paperclip.api_url}}"
      PAPERCLIP_API_KEY: "{{secrets.paperclip.api_key}}"
      PAPERCLIP_COMPANY_ID: "{{runtime.PAPERCLIP_COMPANY_ID}}"
      PAPERCLIP_AGENT_ID: "{{runtime.PAPERCLIP_AGENT_ID}}"
    capabilities:
      - "paperclipMe"
      - "paperclipInboxLite"
      - "paperclipCreateIssue"
      - "paperclipUpdateIssue"
      - "paperclipAddComment"

# Mapeo de agente → MCP servers habilitados
agentMcpMapping:
  finops:
    - "paperclip"
    - "aws-cost-explorer"
    - "azure-cost-management"

  security:
    - "paperclip"
    - "aws-security"
    - "azure-defender"
    - "aws-knowledge-base"

  infra-ops:
    - "paperclip"
    - "aws-cloudwatch"

  knowledge:
    - "paperclip"
    - "aws-knowledge-base"

  cicd:
    - "paperclip"
    - "github-actions"

  compliance:
    - "paperclip"
    - "aws-security"
    - "azure-defender"

  ceo:
    - "paperclip"
