services:
  ollama:
    image: ollama/ollama:latest
    container_name: paperclip-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ../data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
