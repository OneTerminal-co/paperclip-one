# OpsFleet Configuration
# Este archivo controla qué agentes están activos, sus presupuestos, permisos e integraciones MCP

schema: paperclip/v1

# ═══════════════════════════════════════════════════════════════
# Configuración Global de la Company
# ═══════════════════════════════════════════════════════════════
company:
  monthlyBudgetCents: 50000  # $500 USD total
  timezone: "America/Mexico_City"
  
  notifications:
    criticalAlertsEmail: null  # ops@tuempresa.com
    slackWebhook: null         # https://hooks.slack.com/...
    channels:
      critical: "#ops-critical"
      daily: "#ops-daily"

# ═══════════════════════════════════════════════════════════════
# Catálogo de MCP Servers
# Defina aquí todos los MCPs disponibles para la company
# ═══════════════════════════════════════════════════════════════
mcpServers:
  # ─────────────────────────────────────────────────────────────
  # AWS MCP — Cost Explorer, EC2, IAM, CloudWatch, etc.
  # https://github.com/awslabs/mcp
  # ─────────────────────────────────────────────────────────────
  aws:
    name: "AWS MCP Server"
    command: "uvx awslabs.aws-api-mcp-server@latest"
    lifecycle: shared
    description: "AWS API access: Cost Explorer, EC2, IAM, S3, CloudWatch"
    auth:
      type: "aws_credentials"
      env:
        AWS_PROFILE:
          kind: text
          requirement: optional
          description: "Named profile from ~/.aws/credentials"
        AWS_ACCESS_KEY_ID:
          kind: secret
          requirement: optional
          secretRef: "aws-access-key-id"
        AWS_SECRET_ACCESS_KEY:
          kind: secret
          requirement: optional
          secretRef: "aws-secret-access-key"
        AWS_REGION:
          kind: text
          default: "us-east-1"

  # ─────────────────────────────────────────────────────────────
  # Azure MCP — Resource Manager, Cost Management
  # https://github.com/Azure/azure-mcp
  # ─────────────────────────────────────────────────────────────
  azure:
    name: "Azure MCP Server"
    command: "npx @azure/mcp-server"
    lifecycle: shared
    description: "Azure Resource Manager, Cost Management, Security Center"
    auth:
      type: "azure_service_principal"
      env:
        AZURE_SUBSCRIPTION_ID:
          kind: text
          requirement: required
          description: "Azure subscription to monitor"
        AZURE_TENANT_ID:
          kind: text
          requirement: required
        AZURE_CLIENT_ID:
          kind: secret
          requirement: required
          secretRef: "azure-client-id"
        AZURE_CLIENT_SECRET:
          kind: secret
          requirement: required
          secretRef: "azure-client-secret"

  # ─────────────────────────────────────────────────────────────
  # Slack MCP — Notificaciones y mensajes
  # https://mcp.slack.com/mcp
  # ─────────────────────────────────────────────────────────────
  slack:
    name: "Slack MCP Server"
    url: "https://mcp.slack.com/mcp"
    lifecycle: shared
    description: "Send messages, create channels, manage notifications"
    auth:
      type: "oauth_bot_token"
      env:
        SLACK_BOT_TOKEN:
          kind: secret
          requirement: required
          secretRef: "slack-bot-token"
          description: "Bot User OAuth Token (xoxb-...)"
        SLACK_SIGNING_SECRET:
          kind: secret
          requirement: optional
          secretRef: "slack-signing-secret"

  # ─────────────────────────────────────────────────────────────
  # Sentry MCP — Error tracking y performance
  # https://mcp.sentry.dev/mcp
  # ─────────────────────────────────────────────────────────────
  sentry:
    name: "Sentry MCP Server"
    url: "https://mcp.sentry.dev/mcp"
    lifecycle: shared
    description: "Error tracking, performance monitoring, issue management"
    auth:
      type: "api_token"
      env:
        SENTRY_AUTH_TOKEN:
          kind: secret
          requirement: required
          secretRef: "sentry-auth-token"
          description: "Auth token from sentry.io/settings/auth-tokens/"
        SENTRY_ORG:
          kind: text
          requirement: required
          description: "Organization slug"
        SENTRY_PROJECT:
          kind: text
          requirement: optional
          description: "Default project slug (optional)"

  # ─────────────────────────────────────────────────────────────
  # Datadog MCP — Métricas, logs, APM
  # https://github.com/DataDog/datadog-mcp
  # ─────────────────────────────────────────────────────────────
  datadog:
    name: "Datadog MCP Server"
    command: "npx @datadog/mcp-server"
    lifecycle: shared
    description: "Metrics, logs, APM, dashboards, monitors"
    auth:
      type: "api_key"
      env:
        DD_API_KEY:
          kind: secret
          requirement: required
          secretRef: "datadog-api-key"
        DD_APP_KEY:
          kind: secret
          requirement: required
          secretRef: "datadog-app-key"
          description: "Application key for read access"
        DD_SITE:
          kind: text
          default: "datadoghq.com"
          description: "Datadog site (datadoghq.com, datadoghq.eu, etc.)"

  # ─────────────────────────────────────────────────────────────
  # PagerDuty MCP — Incident management
  # https://github.com/PagerDuty/pagerduty-mcp
  # ─────────────────────────────────────────────────────────────
  pagerduty:
    name: "PagerDuty MCP Server"
    command: "npx @pagerduty/mcp-server"
    lifecycle: shared
    description: "Incident management, on-call schedules, escalations"
    auth:
      type: "api_token"
      env:
        PAGERDUTY_API_TOKEN:
          kind: secret
          requirement: required
          secretRef: "pagerduty-api-token"
          description: "API Token v2 from pagerduty.com/api-keys"

  # ─────────────────────────────────────────────────────────────
  # GitHub MCP — Repos, PRs, Actions, Issues
  # https://github.com/github/github-mcp-server
  # ─────────────────────────────────────────────────────────────
  github:
    name: "GitHub MCP Server"
    command: "npx @github/mcp-server"
    lifecycle: shared
    description: "Repositories, pull requests, Actions workflows, issues"
    auth:
      type: "personal_access_token"
      env:
        GH_TOKEN:
          kind: secret
          requirement: required
          secretRef: "github-token"
          description: "Personal access token or GitHub App token"
        GITHUB_ENTERPRISE_URL:
          kind: text
          requirement: optional
          description: "For GitHub Enterprise Server installations"

  # ─────────────────────────────────────────────────────────────
  # CloudWatch MCP — Logs, Metrics, Alarms (usa creds de AWS)
  # ─────────────────────────────────────────────────────────────
  cloudwatch:
    name: "CloudWatch MCP Server"
    command: "uvx awslabs.cloudwatch-mcp-server@latest"
    lifecycle: shared
    description: "CloudWatch logs, metrics, alarms, dashboards"
    auth:
      type: "aws_credentials"
      inherit: "aws"

# ═══════════════════════════════════════════════════════════════
# Secrets — Credenciales a configurar en Paperclip UI > Secrets
# ═══════════════════════════════════════════════════════════════
secrets:
  # AWS
  aws-access-key-id:
    description: "AWS Access Key ID para API calls"
    required: false
  aws-secret-access-key:
    description: "AWS Secret Access Key"
    required: false
  
  # Azure
  azure-client-id:
    description: "Azure Service Principal Client ID"
    required: false
  azure-client-secret:
    description: "Azure Service Principal Secret"
    required: false
  
  # Slack
  slack-bot-token:
    description: "Slack Bot Token (xoxb-...)"
    required: true
  slack-signing-secret:
    description: "Slack Signing Secret para verificar requests"
    required: false
  
  # Sentry
  sentry-auth-token:
    description: "Sentry Auth Token"
    required: false
  
  # Datadog
  datadog-api-key:
    description: "Datadog API Key"
    required: false
  datadog-app-key:
    description: "Datadog Application Key"
    required: false
  
  # PagerDuty
  pagerduty-api-token:
    description: "PagerDuty API Token v2"
    required: false
  
  # GitHub
  github-token:
    description: "GitHub Personal Access Token o App Token"
    required: false

# ═══════════════════════════════════════════════════════════════
# Configuración por Agente
# ═══════════════════════════════════════════════════════════════
agents:
  # ─────────────────────────────────────────────────────────────
  # CEO Agent — Síntesis ejecutiva diaria
  # ─────────────────────────────────────────────────────────────
  ceo:
    enabled: true
    schedule:
      frequency: "daily"
      time: "08:00"
    budget:
      monthlyLimitCents: 10000
      warnAtPercent: 80
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: Slack para enviar resumen diario
    mcpServers:
      - slack

  # ─────────────────────────────────────────────────────────────
  # FinOps Agent — Optimización de costos cloud
  # ─────────────────────────────────────────────────────────────
  finops:
    enabled: true
    schedule:
      frequency: "every_8_hours"
    budget:
      monthlyLimitCents: 8000
      warnAtPercent: 80
    permissions:
      mode: "read"  # Cambiar a "write" para ejecutar acciones
    config:
      clouds: [aws, azure]
      anomalyThresholdPercent: 20
      idleCpuThresholdPercent: 5
      accessKeyRotationDays: 90
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: AWS y Azure para costos, Slack para alertas
    mcpServers:
      - aws
      - azure
      - slack

  # ─────────────────────────────────────────────────────────────
  # Security Agent — Postura de seguridad continua
  # ─────────────────────────────────────────────────────────────
  security:
    enabled: true
    schedule:
      frequency: "every_12_hours"
    budget:
      monthlyLimitCents: 8000
      warnAtPercent: 80
    permissions:
      mode: "read"  # Cambiar a "write" para rotación de secrets
    config:
      clouds: [aws, azure]
      severities: [CRITICAL, HIGH, MEDIUM]
      secretRotationDays: 90
      criticalPorts: [22, 3389, 5432, 3306, 27017]
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: AWS/Azure para IAM/SecGroups, Sentry para errores, Slack para alertas
    mcpServers:
      - aws
      - azure
      - sentry
      - slack

  # ─────────────────────────────────────────────────────────────
  # Infra Ops Agent — Monitoreo y respuesta a incidentes
  # ─────────────────────────────────────────────────────────────
  infra-ops:
    enabled: true
    schedule:
      frequency: "every_4_hours"
    budget:
      monthlyLimitCents: 8000
      warnAtPercent: 80
    permissions:
      mode: "read"
    config:
      sources: [cloudwatch, datadog, prometheus]
      sla:
        uptimeTargetPercent: 99.9
        p95LatencyMs: 500
        errorRatePercent: 1
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: AWS/CloudWatch para métricas, Datadog para APM, PagerDuty para incidentes
    mcpServers:
      - aws
      - cloudwatch
      - datadog
      - pagerduty
      - slack

  # ─────────────────────────────────────────────────────────────
  # Knowledge Agent — Respuestas técnicas on-demand
  # ─────────────────────────────────────────────────────────────
  knowledge:
    enabled: true
    schedule:
      frequency: "on_demand"
    budget:
      monthlyLimitCents: 5000
      warnAtPercent: 80
    config:
      sources: [internal_docs, runbooks, aws_docs, azure_docs]
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: Ninguno — usa documentación local
    mcpServers: []

  # ─────────────────────────────────────────────────────────────
  # CI/CD Agent — Monitoreo de pipelines
  # ─────────────────────────────────────────────────────────────
  cicd:
    enabled: false  # 👈 DESACTIVADO — activar cuando tengas pipelines
    schedule:
      frequency: "every_6_hours"
    budget:
      monthlyLimitCents: 5000
      warnAtPercent: 80
    config:
      platforms: [github_actions, gitlab_ci, jenkins]
      buildTimeDegradationPercent: 20
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: GitHub para Actions/PRs, Slack para notificaciones
    mcpServers:
      - github
      - slack

  # ─────────────────────────────────────────────────────────────
  # Compliance Agent — Verificación de cumplimiento
  # ─────────────────────────────────────────────────────────────
  compliance:
    enabled: false  # 👈 DESACTIVADO — activar si tienes requisitos regulatorios
    schedule:
      frequency: "daily"
      time: "06:00"
    budget:
      monthlyLimitCents: 6000
      warnAtPercent: 80
    config:
      frameworks: [SOC2, ISO27001, HIPAA, PCI_DSS]
      criticalControls:
        - encryption_at_rest
        - encryption_in_transit
        - mfa_enabled
        - logging_enabled
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-20250514
    # MCPs: AWS/Azure para Config Rules, Slack para reportes
    mcpServers:
      - aws
      - azure
      - slack

# ═══════════════════════════════════════════════════════════════
# Resumen de Configuración
# ═══════════════════════════════════════════════════════════════
#
# ┌─────────────┬─────────────────────────────────────┬────────────┐
# │ Agente      │ MCPs                                │ Status     │
# ├─────────────┼─────────────────────────────────────┼────────────┤
# │ CEO         │ slack                               │ ✅ Activo  │
# │ FinOps      │ aws, azure, slack                   │ ✅ Activo  │
# │ Security    │ aws, azure, sentry, slack           │ ✅ Activo  │
# │ Infra Ops   │ aws, cloudwatch, datadog, pagerduty │ ✅ Activo  │
# │ Knowledge   │ (ninguno)                           │ ✅ Activo  │
# │ CI/CD       │ github, slack                       │ ❌ Inactivo│
# │ Compliance  │ aws, azure, slack                   │ ❌ Inactivo│
# └─────────────┴─────────────────────────────────────┴────────────┘
#
# SECRETS MÍNIMOS REQUERIDOS:
#   - slack-bot-token (para notificaciones)
#   - aws-access-key-id + aws-secret-access-key (o AWS_PROFILE local)
#
# CONFIGURAR EN: Paperclip UI > Company > Secrets
#
